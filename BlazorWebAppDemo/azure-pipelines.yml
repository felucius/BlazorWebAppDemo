trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  # PAS DEZE 4 VARIABELEN AAN NAAR JOUW SITUATIE
  azureServiceConnection: 'WebAppDemoServiceConnection' # De naam van je Service Connection in Azure DevOps
  resourceGroupName: 'rg-blazor-demo-prod'             # De naam van de Resource Groep in Azure
  location: 'westeurope'                               # De regio
  webAppName: 'webapp-blazor-unique-123'              # Een unieke naam voor je webapp

stages:
# --- STAGE 1: BUILD (CI) ---
- stage: Build
  displayName: 'Bouw Blazor App en kopieer Infra'
  jobs:
  - job: BuildJob
    steps:
    # 1. Installeer de juiste .NET SDK (pas aan naar jouw versie, bijv. 8.x)
    - task: UseDotNet@2
      displayName: 'Install .NET 10 SDK'
      inputs:
        version: '10.x'

    # 2. Bouw en Publiceer de Blazor Web App
    - task: DotNetCoreCLI@2
      displayName: 'Dotnet Publish'
      inputs:
        command: 'publish'
        publishWebProjects: true
        arguments: '--configuration Release --output $(Build.ArtifactStagingDirectory)/app'
        zipAfterPublish: false 

    # 3. Kopieer de Bicep bestanden vanuit de /infra map naar de artifact folder
    - task: CopyFiles@2
      displayName: 'Copy Bicep templates'
      inputs:
        SourceFolder: 'infra'
        Contents: '**'
        TargetFolder: '$(Build.ArtifactStagingDirectory)/infra'

    # 4. Maak het 'drop' artifact aan voor de volgende stage
    - publish: $(Build.ArtifactStagingDirectory)
      artifact: drop
      displayName: 'Publish Artifact'

# --- STAGE 2: DEPLOY (CD) ---
- stage: Deploy
  displayName: 'Infrastructuur en App uitrollen'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeployJob
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          # Haal het artifact (app + infra) op
          - download: current
            artifact: drop

          # 1. Voer Bicep uit: Maak de App Service Plan en Web App aan
          - task: AzureResourceManagerTemplateDeployment@3
            displayName: 'Deploy Azure Infrastructure (Bicep)'
            inputs:
              deploymentScope: 'Resource Group'
              azureResourceManagerConnection: $(azureServiceConnection)
              action: 'Create Or Update Resource Group'
              resourceGroupName: $(resourceGroupName)
              location: $(location)
              templateLocation: 'Linked artifact'
              csmFile: '$(Pipeline.Workspace)/drop/infra/main.bicep'
              overrideParameters: '-webAppName $(webAppName) -location $(location)'
              deploymentMode: 'Incremental'

          # 2. Deploy de Blazor code naar de zojuist gemaakte Web App
          - task: AzureWebAppDeployment@4
            displayName: 'Deploy Blazor App to Azure'
            inputs:
              azureSubscription: $(azureServiceConnection)
              appType: 'webApp'
              appName: $(webAppName)
              package: '$(Pipeline.Workspace)/drop/app'
