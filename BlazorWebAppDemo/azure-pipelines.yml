trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  azureServiceConnection: 'WebAppDemoServiceConnection'
  resourceGroupName: 'rg-blazor-demo-prod'
  location: 'westeurope'
  webAppName: 'webapp-blazor-unique-123'
  containerImageName: 'blazor-demo-app'

stages:
# --- STAGE 1: BUILD ---
- stage: Build
  displayName: 'Build App & Container'
  jobs:
  - job: BuildJob
    steps:
    - task: UseDotNet@2
      inputs:
        version: '10.x'

    # 1. Build voor App Service (ZIP)
    - task: DotNetCoreCLI@2
      displayName: 'Publish for App Service'
      inputs:
        command: 'publish'
        publishWebProjects: true
        arguments: '--configuration Release --output $(Build.ArtifactStagingDirectory)/app'
        zipAfterPublish: true 

    # 2. Haal dynamisch de ACR naam op uit de Resource Group
    - task: AzureCLI@2
      displayName: 'Get ACR Name'
      inputs:
        azureSubscription: $(azureServiceConnection)
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          ACR_NAME=$(az acr list --resource-group $(resourceGroupName) --query "[0].name" -o tsv)
          echo "##vso[task.setvariable variable=acrName]$ACR_NAME"

    # 3. Build & Push Docker Image (Context is root van de repo)
    - task: Docker@2
      displayName: 'Build and Push to ACR'
      inputs:
        command: 'buildAndPush'
        containerRegistry: $(azureServiceConnection)
        repository: $(containerImageName)
        dockerfile: '**/Dockerfile'
        tags: |
          $(Build.BuildId)
          latest

    - task: CopyFiles@2
      inputs:
        SourceFolder: 'infra'
        Contents: '**'
        TargetFolder: '$(Build.ArtifactStagingDirectory)/infra'

    - publish: $(Build.ArtifactStagingDirectory)
      artifact: drop

# --- STAGE 2: DEPLOY ---
- stage: Deploy
  displayName: 'Deploy to Azure'
  dependsOn: Build
  jobs:
  - deployment: DeployJob
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: drop

          # 1. Infrastructuur Update
          - task: AzureResourceManagerTemplateDeployment@3
            displayName: 'Deploy Bicep (Both Apps)'
            inputs:
              deploymentScope: 'Resource Group'
              azureResourceManagerConnection: $(azureServiceConnection)
              action: 'Create Or Update Resource Group'
              resourceGroupName: $(resourceGroupName)
              location: $(location)
              templateLocation: 'Linked artifact'
              csmFile: '$(Pipeline.Workspace)/drop/infra/main.bicep'
              overrideParameters: >
                -webAppName $(webAppName) 
                -location $(location) 
                -containerImage $(acrName).azurecr.io/$(containerImageName):$(Build.BuildId)
              deploymentMode: 'Incremental'

          # 2. Deploy naar App Service
          - task: AzureRmWebAppDeployment@4
            displayName: 'Deploy to Web App'
            inputs:
              azureSubscription: $(azureServiceConnection)
              WebAppName: $(webAppName)
              Package: '$(Pipeline.Workspace)/drop/app/**/*.zip'

          # 3. Deploy naar Container App
          - task: AzureContainerApps@1
            displayName: 'Update Container App'
            inputs:
              azureSubscription: $(azureServiceConnection)
              containerAppName: $(webAppName)-aca
              resourceGroup: $(resourceGroupName)
              imageToDeploy: '$(acrName).azurecr.io/$(containerImageName):$(Build.BuildId)'
