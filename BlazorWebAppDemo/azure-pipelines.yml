trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  azureServiceConnection: 'WebAppDemoServiceConnection'
  resourceGroupName: 'rg-blazor-demo-prod'
  location: 'westeurope'
  webAppName: 'webapp-blazor-unique-123'

stages:
# --- STAGE 1: BUILD (CI) ---
- stage: Build
  displayName: 'Bouw Blazor App en kopieer Infra'
  jobs:
  - job: BuildJob
    steps:
    - task: UseDotNet@2
      displayName: 'Install .NET 10 SDK'
      inputs:
        version: '10.x'

    - task: DotNetCoreCLI@2
      displayName: 'Dotnet Publish'
      inputs:
        command: 'publish'
        publishWebProjects: true
        arguments: '--configuration Release --output $(Build.ArtifactStagingDirectory)/app'
        zipAfterPublish: false 

    - task: CopyFiles@2
      displayName: 'Copy Bicep templates'
      inputs:
        SourceFolder: 'infra'
        Contents: '**'
        TargetFolder: '$(Build.ArtifactStagingDirectory)/infra'

    - publish: $(Build.ArtifactStagingDirectory)
      artifact: drop
      displayName: 'Publish Artifact'

# --- STAGE 2: DEPLOY (CD) ---
- stage: Deploy
  displayName: 'Infrastructuur en App uitrollen'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeployJob
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: drop

          - task: AzureResourceManagerTemplateDeployment@3
            displayName: 'Deploy Azure Infrastructure (Bicep)'
            inputs:
              deploymentScope: 'Resource Group'
              azureResourceManagerConnection: $(azureServiceConnection)
              action: 'Create Or Update Resource Group'
              resourceGroupName: $(resourceGroupName)
              location: $(location)
              templateLocation: 'Linked artifact'
              csmFile: '$(Pipeline.Workspace)/drop/infra/main.bicep'
              overrideParameters: '-webAppName $(webAppName) -location $(location)'
              deploymentMode: 'Incremental'

          - task: AzureRmWebAppDeployment@4
            displayName: 'Deploy Blazor App to Azure'
            inputs:
              azureSubscription: $(azureServiceConnection)
              WebAppName: $(webAppName)
              Package: '$(Pipeline.Workspace)/drop/app/BlazorWebAppDemo'
