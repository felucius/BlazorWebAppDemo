trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  # Connections
  azureServiceConnection: 'WebAppDemoServiceConnection'
  dockerRegistryServiceConnection: 'MyACRServiceConnection' # Must create this in Project Settings
  
  # ACR Variables
  containerRegistry: 'blazordemoappfontys.azurecr.io'
  imageRepository: 'blazor-app'
  tag: '$(Build.BuildId)'
  
  # App Service Variables
  resourceGroupName: 'rg-blazor-demo-prod'
  location: 'westeurope'
  webAppName: 'webapp-blazor-unique-123'

stages:
- stage: Build
  displayName: 'Build App Service Artifact & Container Image'
  jobs:
  - job: BuildJob
    steps:
    # --- Part A: For App Service Plan ---
    - task: UseDotNet@2
      inputs: { version: '10.x' }

    - task: DotNetCoreCLI@2
      displayName: 'Publish for App Service (Zip)'
      inputs:
        command: 'publish'
        publishWebProjects: true
        arguments: '--configuration Release --output $(Build.ArtifactStagingDirectory)/app'
        zipAfterPublish: true # Required for AzureRmWebAppDeployment

    # --- Part B: For Container Registry ---
    - task: Docker@2
      displayName: 'Build and Push to ACR'
      inputs:
        command: buildAndPush
        containerRegistry: $(dockerRegistryServiceConnection)
        repository: $(imageRepository)
        dockerfile: '$(Build.SourcesDirectory)/Dockerfile'
        tags: |
          $(tag)
          latest

    # --- Part C: Infrastructure & Artifacts ---
    - task: CopyFiles@2
      inputs:
        SourceFolder: 'infra'
        Contents: '**'
        TargetFolder: '$(Build.ArtifactStagingDirectory)/infra'

    - publish: $(Build.ArtifactStagingDirectory)
      artifact: drop

- stage: Deploy
  displayName: 'Deploy Both'
  dependsOn: Build
  jobs:
  - deployment: DeployJob
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: drop

          # 1. Deploy Infrastructure (Bicep)
          - task: AzureResourceManagerTemplateDeployment@3
            inputs:
              azureResourceManagerConnection: $(azureServiceConnection)
              resourceGroupName: $(resourceGroupName)
              location: $(location)
              csmFile: '$(Pipeline.Workspace)/drop/infra/main.bicep'
              overrideParameters: '-webAppName $(webAppName) -location $(location)'

          # 2. Deploy to Standard App Service (Zip)
          - task: AzureRmWebAppDeployment@4
            inputs:
              azureSubscription: $(azureServiceConnection)
              WebAppName: $(webAppName)
              Package: '$(Pipeline.Workspace)/drop/app/**/*.zip'
